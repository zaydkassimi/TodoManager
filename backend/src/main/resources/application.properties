spring.application.name=todo-backend

# Neon PostgreSQL (uses env vars)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/todo_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=${DB_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.show-sql=false

spring.h2.console.enabled=false

# JWT
jwt.secret=${JWT_SECRET:change-this-to-a-random-secret}
jwt.expiration=86400000

# Server
server.port=8080

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174
